apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-ip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-ip
  template:
    metadata:
      labels:
        app: my-ip
    spec:

      containers:
        - name: my-ip
          image: ghcr.io/jeanribes/my-ip:main
          resources:
            requests:
              memory: "32Mi"
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: http3
              containerPort: 443
              protocol: UDP
          command: ["/app/main"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true